<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pagina niet gevonden</title>
    <style>
        :root { --blue: #002d62; --dark: #000c1a; --red: #da291c; --text: #ffffff; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .error-card { 
            background: #1a2b44; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 360px; 
            border: 2px solid var(--blue);
        }
        .logo { width: 90px; margin-bottom: 15px; }
        h1 { color: var(--red); font-size: 4rem; margin: 0; }
        h2 { margin: 10px 0; font-size: 1.4rem; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }
        .btn { 
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px; 
            border-radius: 8px; 
            background: var(--red); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { background: #b31d14; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="error-card">
        <img src="/static/logo.png" alt="Logo Shawano's" class="logo">
        <h1>404</h1>
        <h2>Oeps! Pagina niet gevonden</h2>
        <p>De opgevraagde pagina bestaat niet of de link is veranderd. Klik op de knop hieronder om terug te gaan naar de barkaart.</p>
        <a href="/" class="btn">TERUG NAAR BARKAART</a>
    </div>
</body>
</html>
