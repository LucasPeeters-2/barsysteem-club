<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shawano's</title>
    <style>
        :root { --blue: #002d62; --dark: #000c1a; --red: #da291c; --text: #ffffff; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: #1a2b44; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 320px; 
            border: 2px solid var(--blue);
        }
        .logo { width: 80px; margin-bottom: 10px; }
        h2 { color: var(--red); margin: 10px 0; }
        p { color: #aaa; margin-bottom: 20px; }
        
        /* DE FOUTMELDING STYLING */
        .error-message {
            background: var(--red);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.2);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        form { display: flex; flex-direction: column; gap: 15px; }
        select, input { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            background: white; 
            font-size: 1rem;
        }
        button { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            background: var(--red); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background: #b31d14; transform: scale(1.02); }
        .back-link { 
            display: block; 
            margin-top: 20px; 
            color: #888; 
            text-decoration: none; 
            font-size: 0.8rem; 
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/static/logo.png" alt="Logo Shawano's" class="logo">
        <h2>Shawano's Lisse</h2>
        <p>Admin Login</p>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <select name="username" required>
                <option value="" disabled selected>Wie ben je?</option>
                {% for name in admin_names %}
                <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
            <input type="password" name="pincode" placeholder="Pincode" autofocus required maxlength="8">
            <button type="submit">🔒 Inloggen</button>
        </form>
        <a href="/" class="back-link">← Terug naar Bar</a>
    </div>
</body>
</html>
