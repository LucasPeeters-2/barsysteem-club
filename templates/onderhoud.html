<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onderhoud - Shawano's Lisse</title>
    <meta http-equiv="refresh" content="10">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/webp" href="/static/favicon.webp?v=2">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; /* Shawano donkergrijs/blauw */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            text-align: center;
            background: #34495e;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #27ae60; /* Scouting groen accent */
            max-width: 80%;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 { margin: 0; color: #27ae60; }
        p { font-size: 1.2rem; opacity: 0.8; }
        .loader {
            border: 5px solid #2c3e50;
            border-top: 5px solid #27ae60;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚧</div>
        <h1>Even Geduld...</h1>
        <p>Het barsysteem is momenteel in onderhoud.</p>
        <div class="loader"></div>
        <p><small>We zijn de voorraad aan het tellen of het systeem aan het updaten.<br>
        Zodra we klaar zijn, verschijnt de namenlijst hier weer.</small></p>
    </div>
</body>
</html>
