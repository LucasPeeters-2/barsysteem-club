<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Systeemfout</title>
    <style>
        :root { --blue: #002d62; --dark: #000c1a; --red: #da291c; --text: #ffffff; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .error-card { 
            background: #1a2b44; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 400px; 
            border: 2px solid var(--red);
            animation: pulse-border 2s infinite alternate;
        }
        @keyframes pulse-border {
            from { border-color: var(--red); }
            to { border-color: #500a05; }
        }
        .logo { width: 90px; margin-bottom: 15px; }
        h1 { color: var(--red); font-size: 3.5rem; margin: 0; }
        h2 { margin: 10px 0; font-size: 1.4rem; color: #ff8883; }
        p { color: #ccc; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        .btn { 
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px; 
            border-radius: 8px; 
            background: var(--blue); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn:hover { background: #001f44; transform: scale(1.02); }
        .footer-notice { font-size: 0.75rem; color: #888; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="error-card">
        <img src="/static/logo.png" alt="Logo Shawano's" class="logo">
        <h1>500</h1>
        <h2>Systeemfout opgetreden</h2>
        <p>De server liep vast bij het verwerken van de aanvraag (bijvoorbeeld door een database-lock of data-fout). De beheerder kan de exacte oorzaak terugvinden in het logbestand.</p>
        <a href="/" class="btn">PROBEER OPNIEUW</a>
        <span class="footer-notice">De fout is automatisch weggeschreven naar errordump.txt</span>
    </div>
</body>
</html>
